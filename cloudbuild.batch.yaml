# Builds the batch image (Dockerfile.batch) for the run-batch / sync-to-compendium jobs.
#   gcloud builds submit --config cloudbuild.batch.yaml --substitutions=_IMAGE=<img> .
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "Dockerfile.batch", "-t", "${_IMAGE}", "."]
images:
  - "${_IMAGE}"
options:
  logging: CLOUD_LOGGING_ONLY
